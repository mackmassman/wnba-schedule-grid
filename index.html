<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WNBA Fantasy Schedule Grid</title>

<style>
:root {--bg:#f6f6f7; --card:#fff; --grid:#e7e9ef; --text:#2c3340; --muted:#6b7280; --head:#f1f0f6; --accent:#ff6b2c;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:Inter,system-ui;color:var(--text);}
.wrap{display:grid;grid-template-columns:260px 1fr;gap:20px;padding:20px}
.sidebar{background:#fff;padding:18px;border-radius:8px}
.main{background:#fff;padding:18px;border-radius:8px}

label{display:block;margin:6px 0}
input,select{margin:4px 0;padding:6px}

.roster-row{display:flex;gap:6px;margin-bottom:6px}

.rec{margin-top:20px;padding:12px;background:#fafafa;border-radius:8px}
</style>
</head>

<body>
<div class="wrap">

<div class="sidebar">
<h3>Week</h3>
<select id="weekSelect"></select>

<h3>Days</h3>
<div id="dayChecks"></div>

<h3>Roster</h3>
<div id="roster"></div>
<button onclick="addPlayer()">+ Add Player</button>
</div>

<div class="main">
<h2 id="title"></h2>
<div id="grid"></div>
<div id="recommendations"></div>
</div>

</div>

<script>

// ====== DATA ======
const SCHEDULE = window.SCHEDULE || [];
const WEEKS = [
["Week 1","2026-05-08","2026-05-17"],
["Week 2","2026-05-18","2026-05-24"],
["Week 3","2026-05-25","2026-05-31"]
];

// ====== ROSTER ======
let roster = [];

function addPlayer(){
  roster.push({team:"",pos:"G"});
  renderRoster();
}

function renderRoster(){
  document.getElementById('roster').innerHTML = roster.map((p,i)=>`
    <div class="roster-row">
      <input placeholder="Team (e.g. NY)" value="${p.team}" 
        onchange="roster[${i}].team=this.value.toUpperCase()">
      <select onchange="roster[${i}].pos=this.value">
        <option ${p.pos=='G'?'selected':''}>G</option>
        <option ${p.pos=='F'?'selected':''}>F</option>
        <option ${p.pos=='C'?'selected':''}>C</option>
        <option ${p.pos=='F/C'?'selected':''}>F/C</option>
      </select>
    </div>
  `).join('');
}

// ====== HELPERS ======
function dateRange(s,e){
  let out=[], d=new Date(s);
  let end=new Date(e);
  while(d<=end){
    out.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return out;
}

// ====== DAY CHECKS ======
function updateDays(){
  let w = WEEKS[weekSelect.value];
  let dates = dateRange(w[1],w[2]);

  dayChecks.innerHTML = dates.map(d=>`
    <label>
      <input type="checkbox" class="day" data-date="${d}" checked>
      ${d}
    </label>
  `).join("");

  document.querySelectorAll('.day').forEach(d=>{
    d.onchange = render;
  });
}

// ====== RECOMMENDATIONS ======
function getRecommendations(games, shownDates){

  let teamGames = {};

  games.forEach(g=>{
    teamGames[g.Home]=(teamGames[g.Home]||0)+1;
    teamGames[g.Away]=(teamGames[g.Away]||0)+1;
  });

  let rosterGames = roster.map(p=>({
    ...p,
    games: teamGames[p.team]||0
  }));

  let drops = [...rosterGames]
    .sort((a,b)=>a.games-b.games)
    .slice(0,3);

  let pickups = Object.entries(teamGames)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  return {drops,pickups};
}

// ====== RENDER ======
function render(){

  let w = WEEKS[weekSelect.value];
  let shown = [...document.querySelectorAll('.day:checked')]
    .map(d=>d.dataset.date);

  let games = SCHEDULE.filter(g=>{
    let d = g["Start (UTC)"].slice(0,10);
    return d>=w[1] && d<=w[2] && shown.includes(d);
  });

  let rec = getRecommendations(games, shown);

  // render grid (simple count)
  let teamGames = {};
  games.forEach(g=>{
    teamGames[g.Home]=(teamGames[g.Home]||0)+1;
    teamGames[g.Away]=(teamGames[g.Away]||0)+1;
  });

  let gridHTML = "<h3>Team Games</h3>";
  Object.entries(teamGames)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([t,g])=>{
      gridHTML += `${t}: ${g}<br>`;
    });

  document.getElementById('grid').innerHTML = gridHTML;

  // render recommendations
  let html = `<div class="rec"><h3>Recommendations</h3>`;

  html += `<b>Top Teams:</b><br>`;
  rec.pickups.forEach(([t,g])=>{
    html += `${t} — ${g} games<br>`;
  });

  html += `<br><b>Drop Candidates:</b><br>`;
  rec.drops.forEach(p=>{
    html += `${p.team} (${p.pos}) — ${p.games} games<br>`;
  });

  html += `</div>`;

  document.getElementById('recommendations').innerHTML = html;
}

// ====== INIT ======
window.onload = ()=>{
  weekSelect.innerHTML = WEEKS.map((w,i)=>
    `<option value="${i}">${w[0]}</option>`
  ).join("");

  weekSelect.onchange = ()=>{
    updateDays();
    render();
  };

  updateDays();
  render();
};

</script>
</body>
</html>
