function abbr(t){return TEAM_ABBR[t]||String(t).slice(0,3).toUpperCase()} function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function parts(date,tz){const f=new Intl.DateTimeFormat('en-CA',{timeZone:tz,weekday:'long',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false,timeZoneName:'short'}); let o={}; for(const p of f.formatToParts(date)) o[p.type]=p.value; return o;}
function isoDate(date,tz){let p=parts(date,tz); return `${p.year}-${p.month}-${p.day}`;} function pretty(iso){const [y,m,d]=iso.split('-').map(Number); const dt=new Date(Date.UTC(y,m-1,d)); return new Intl.DateTimeFormat('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric', timeZone:'UTC'}).format(dt);}
function dateRange(s,e){let out=[], d=new Date(s+'T00:00:00Z'), end=new Date(e+'T00:00:00Z'); while(d<=end){out.push(d.toISOString().slice(0,10)); d.setUTCDate(d.getUTCDate()+1);} return out;}
function fmtDateLabel(iso){const dt=new Date(iso+'T00:00:00Z'); return new Intl.DateTimeFormat('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'UTC'}).format(dt);}
function updateDayChecks(){const wi=+document.getElementById('weekSelect').value; const [,start,end]=WEEKS[wi]; const dates=dateRange(start,end); document.getElementById('dayChecks').innerHTML=dates.map(iso=>`<label><input type="checkbox" class="dateCheck" data-date="${iso}" checked> ${fmtDateLabel(iso)}</label>`).join(''); document.querySelectorAll('.dateCheck').forEach(el=>el.addEventListener('change',render));}
function render(){const tz=document.getElementById('tz').value; const wi=+document.getElementById('weekSelect').value; const [name,start,end]=WEEKS[wi]; const shown=[...document.querySelectorAll('.dateCheck:checked')].map(el=>el.dataset.date);
const games=SCHEDULE.map(g=>{let date=new Date(g['Start (UTC)']); let p=parts(date,tz); return {...g, dt:date, localDate:isoDate(date,tz), weekday:p.weekday, time:`${p.hour}:${p.minute} ${p.timeZoneName||''}`};}).filter(g=>g.localDate>=start && g.localDate<=end && WNBA.has(g.Away) && WNBA.has(g.Home));
const visibleGames=games.filter(g=>shown.includes(g.localDate));
const teams=[...new Set(games.flatMap(g=>[g.Away,g.Home]))].sort((a,b)=>abbr(a).localeCompare(abbr(b))); const counts=Object.fromEntries(shown.map(d=>[d,visibleGames.filter(g=>g.localDate===d).length]));
document.getElementById('title').textContent=`${name}: ${pretty(start)} - ${pretty(end)}`; document.getElementById('sub').textContent=`${visibleGames.length} games counted from checked days (${games.length} total in full week)`;
let dayHeads=shown.map(d=>fmtDateLabel(d).toUpperCase()); let out='<table><thead><tr><th class="teamcol">TEAM</th><th>GAMES</th>'+dayHeads.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'; out+=`<tr class="summary"><td class="team"># Games Played</td><td class="games">${visibleGames.length}</td>`+shown.map(d=>`<td>${counts[d]||0}</td>`).join('')+'</tr>';
for(const team of teams){const tg=visibleGames.filter(g=>g.Away===team||g.Home===team); out+=`<tr><td class="team">${esc(team)}</td><td class="games">${tg.length}</td>`; for(const d of shown){const labels=tg.filter(g=>g.localDate===d).sort((a,b)=>a.dt-b.dt).map(g=>g.Away===team?'@'+abbr(g.Home):abbr(g.Away)); out+=`<td>${esc(labels.join(' / '))}</td>`;} out+='</tr>';} out+='</tbody></table>'; document.getElementById('grid').innerHTML=out;
let raw='<table><thead><tr><th>Date</th><th>Away</th><th>Home</th></tr></thead><tbody>'+visibleGames.sort((a,b)=>a.dt-b.dt).map(g=>`<tr><td>${esc(g.weekday+' '+g.localDate+' '+g.time)}</td><td>${esc(g.Away)}</td><td>${esc(g.Home)}</td></tr>`).join('')+'</tbody></table>'; document.getElementById('raw').innerHTML=raw;}
window.addEventListener('DOMContentLoaded',()=>{document.getElementById('weekSelect').innerHTML=WEEKS.map((w,i)=>`<option value="${i}">${w[0]}: ${w[1].slice(5)} - ${w[2].slice(5)}</option>`).join(''); document.getElementById('weekSelect').addEventListener('change',()=>{updateDayChecks(); render();}); document.getElementById('tz').addEventListener('change',render); updateDayChecks(); render();});
</script></body></html>
